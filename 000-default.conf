<VirtualHost *:80>
    ServerName moodle.finessefleet.com
    Redirect permanent / https://moodle.finessefleet.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName moodle.finessefleet.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/moodle.finessefleet.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/moodle.finessefleet.com/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/moodle.finessefleet.com/chain.pem

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Order allow,deny
        allow from all

        # Set the base for Moodle to handle the URLs correctly
        RewriteBase /

        # Moodle rewrite rules
        RewriteRule ^(.*)$ /index.php [L]
    </Directory>

    # Ensure Moodle works over SSL
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # Add headers to support Content-Security-Policy (CSP)
    Header always set Content-Security-Policy "upgrade-insecure-requests;"
</VirtualHost>
